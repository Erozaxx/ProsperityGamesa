name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage runtime files (zero-build PWA)
        run: |
          mkdir -p _site
          cp index.html manifest.webmanifest service-worker.js _site/
          cp -r src icons _site/
          # runtime nepotřebuje: .aiworkflow, doc, test, tools, node_modules
          echo "Staged files:"; find _site -maxdepth 2 -type d | sort
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
